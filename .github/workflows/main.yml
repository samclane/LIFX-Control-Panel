name: Smoke Build And Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  smoke-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.21.0
      - name: Build Project
        working-directory: ./lifx_control_panel
        env:
          PYTHONOPTIMIZE: '1'
        run: pyinstaller build_all.spec
  
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Test Project
        working-directory: ./lifx_control_panel
        run: |
          coverage run -m unittest discover test -p "*test*.py"
          coverage report
          coverage xml -o coverage.xml
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./lifx_control_panel/coverage.xml
          flags: unittests
          fail_ci_if_error: false